<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic HTML</title>
</head>
<body>
    <header>
        <h1>My Site</h1>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <h2>Welcome to my Site</h2>
            <p>This is my first paragraph...</p>
            <p>This is my second paragraph...</p>
        </article>
        <aside>
            <h3>Recent Posts</h3>
        </aside>
    </main>
    <footer>
        <p>&copy; 2026</p>
    </footer>
</body>
</html>
